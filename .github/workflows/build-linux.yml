name: Build Linux Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build executable with PyInstaller
        run: |
          pyinstaller tifDebloat.spec

      - name: Create release directory
        run: |
          mkdir -p release
          cp dist/tifDebloat release/
          chmod +x release/tifDebloat

      - name: Verify executable
        run: |
          file release/tifDebloat
          release/tifDebloat --help 2>/dev/null || true

      - name: Create tarball
        run: |
          cd release
          tar -czf tifDebloat-linux-x64.tar.gz tifDebloat
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tifDebloat-linux
          path: release/tifDebloat
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/tifDebloat
            release/tifDebloat-linux-x64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
